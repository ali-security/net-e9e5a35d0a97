name: seal-build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build module zip helper
        run: |
          set -euxo pipefail
          HELPER="$(mktemp -d)"
          cp "$GITHUB_WORKSPACE/.github/create_mod.go" "$HELPER/"
          cd "$HELPER"
          go mod init example.com/mod
          go get golang.org/x/mod@v0.24.0
          go build -o create_mod ./create_mod.go
          echo "HELPER=$HELPER" >> "$GITHUB_ENV"

      - name: Create module zip
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/out"
          rm -rf "$GITHUB_WORKSPACE/.github"
          "$HELPER/create_mod" golang.org/x/net v0.45.0 "$GITHUB_WORKSPACE" "$RUNNER_TEMP/out/v0.45.0.zip"

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: module-zip
          path: ${{ runner.temp }}/out/v0.45.0.zip
          if-no-files-found: error

      - name: Build and test
        run: |
          set -euxo pipefail
          cd "$GITHUB_WORKSPACE"
          go build ./...
          go test ./...
